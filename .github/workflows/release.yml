name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - uses: pnpm/action-setup@v6
        with:
          version: "11.1.3"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm bundle

      - name: Validate version not already tagged
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists. Bump the version and try again."
            exit 1
          fi

      - name: Update CHANGELOG and extract release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! awk '/## \[Unreleased\]/{f=1;next} f && /^## \[/{exit} f && /^-/{found=1;exit} END{exit !found}' CHANGELOG.md; then
            echo "::error::No entries found under [Unreleased] in CHANGELOG.md"
            exit 1
          fi
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md
          awk "/## \[${VERSION}\]/{f=1;next} f && /^## \[/{exit} f{print}" CHANGELOG.md > release_notes.md

      - name: Update package.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm pkg set version="$VERSION"

      - name: Commit and tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json dist/
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Update major version tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          git tag -f "v${MAJOR}"
          git push origin "v${MAJOR}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release_notes.md
